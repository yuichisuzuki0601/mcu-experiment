<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pixel Art Editor</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: sans-serif;
        background: #ddd;
      }
      .controls {
        padding: 15px;
        background: #fff;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .editor-container {
        flex-grow: 1;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px;
      }
      canvas {
        cursor: crosshair;
        image-rendering: pixelated;
        background: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      textarea {
        width: 100%;
        height: 200px;
        font-family: monospace;
        padding: 10px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      Width: <input type="text" id="w" value="16" min="8" max="64" /> Height:
      <input type="text" id="h" value="16" min="8" max="64" />
      <button id="resize">Resize</button>
      <button id="reset-size">Reset 16x16</button>
    </div>
    <div class="editor-container">
      <canvas id="canvas"></canvas>
    </div>
    <textarea
      id="output"
      readonly
      placeholder="ここにコードが出力されます"
    ></textarea>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const cellSize = 20;
      const padding = 30;

      const widthInput = document.getElementById("w");
      const heightInput = document.getElementById("h");
      const resizeButton = document.getElementById("resize");
      const resetSizeButton = document.getElementById("reset-size");
      const output = document.getElementById("output");

      let w = 16;
      let h = 16;
      let grid = createGrid(w, h);
      let isDrawing = false;
      let drawMode = 1;

      function createGrid(width, height) {
        return Array.from({ length: height }, () => Array(width).fill(0));
      }

      function copyGrid(source, width, height) {
        const nextGrid = createGrid(width, height);
        for (let y = 0; y < Math.min(source.length, height); y++) {
          for (let x = 0; x < Math.min(source[y].length, width); x++) {
            nextGrid[y][x] = source[y][x];
          }
        }
        return nextGrid;
      }

      function getCellPosition(e) {
        return {
          x: Math.floor((e.offsetX - padding) / cellSize),
          y: Math.floor((e.offsetY - padding) / cellSize),
        };
      }

      function isInGrid(x, y) {
        return x >= 0 && x < w && y >= 0 && y < h;
      }

      function changeInputValue(input, delta) {
        const min = parseInt(input.min);
        const max = parseInt(input.max);
        const currentValue = parseInt(input.value) || min;
        input.value = Math.max(min, Math.min(max, currentValue + delta));
      }

      function handleSizeInputKeydown(e) {
        if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;
        e.preventDefault();

        changeInputValue(e.target, e.key === "ArrowUp" ? 1 : -1);
      }

      function init() {
        const newW = parseInt(widthInput.value);
        const newH = parseInt(heightInput.value);

        grid = copyGrid(grid, newW, newH);

        w = newW;
        h = newH;
        canvas.width = w * cellSize + padding;
        canvas.height = h * cellSize + padding;
        draw();
      }

      function resetSize() {
        widthInput.value = 16;
        heightInput.value = 16;
        init();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "12px sans-serif";
        ctx.fillStyle = "#666";

        drawColumnLabels();
        drawRowLabels();
        drawGrid();
        generateCode();
      }

      function drawColumnLabels() {
        ctx.fillStyle = "#666";
        ctx.textAlign = "center";
        for (let i = 0; i < w; i++) {
          ctx.fillText(i + 1, padding + i * cellSize + cellSize / 2, 20);
        }
      }

      function drawRowLabels() {
        ctx.fillStyle = "#666";
        ctx.textAlign = "right";
        for (let i = 0; i < h; i++) {
          ctx.fillText(
            i + 1,
            padding - 5,
            padding + i * cellSize + cellSize / 2 + 4,
          );
        }
      }

      function drawGrid() {
        ctx.strokeStyle = "#eee";
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            ctx.strokeRect(
              padding + x * cellSize,
              padding + y * cellSize,
              cellSize,
              cellSize,
            );
            if (grid[y][x]) {
              ctx.fillStyle = "#000";
              ctx.fillRect(
                padding + x * cellSize + 1,
                padding + y * cellSize + 1,
                cellSize - 2,
                cellSize - 2,
              );
            }
          }
        }
      }

      canvas.onmousedown = (e) => {
        isDrawing = true;
        const { x, y } = getCellPosition(e);
        if (isInGrid(x, y)) {
          drawMode = grid[y][x] ? 0 : 1;
          grid[y][x] = drawMode;
          draw();
        }
      };

      canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        const { x, y } = getCellPosition(e);
        if (isInGrid(x, y)) {
          grid[y][x] = drawMode;
          draw();
        }
      };

      resizeButton.onclick = init;
      resetSizeButton.onclick = resetSize;
      widthInput.onkeydown = handleSizeInputKeydown;
      heightInput.onkeydown = handleSizeInputKeydown;
      window.onmouseup = () => (isDrawing = false);

      function generateCode() {
        let code = `size: (${w}, ${h})\n(\n`;
        for (let y = 0; y < h; y++) {
          let val = parseInt(grid[y].join(""), 2);
          code += `  0x${val.toString(16).padStart(Math.ceil(w / 4), "0")},\n`;
        }
        code += ")";
        output.value = code;
      }

      // 初回描画
      init();
    </script>
  </body>
</html>
