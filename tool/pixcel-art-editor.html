<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pixel Art Editor</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: sans-serif;
        background: #ddd;
      }
      .controls {
        padding: 15px;
        background: #fff;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .editor-container {
        flex-grow: 1;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      canvas {
        cursor: crosshair;
        image-rendering: pixelated;
        background: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      textarea {
        width: 100%;
        height: 200px;
        font-family: monospace;
        padding: 10px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      Width: <input type="text" id="w" value="16" min="8" max="64" /> Height:
      <input type="text" id="h" value="16" min="8" max="64" />
      <button onclick="init()">Resize (keep data)</button>
    </div>
    <div class="editor-container">
      <canvas id="canvas"></canvas>
    </div>
    <textarea
      id="output"
      readonly
      placeholder="ここにコードが出力されます"
    ></textarea>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const output = document.getElementById("output");
      let w = 16,
        h = 16;
      let grid = Array(h)
        .fill(0)
        .map(() => Array(w).fill(0));
      const cellSize = 20;
      const padding = 30;
      let isDrawing = false;
      let drawMode = 1;

      function init() {
        const newW = parseInt(document.getElementById("w").value);
        const newH = parseInt(document.getElementById("h").value);

        // 現在のグリッドデータを退避
        const oldGrid = grid;

        // 新しいグリッド作成
        grid = Array(newH)
          .fill(0)
          .map(() => Array(newW).fill(0));

        // データ引き継ぎ
        for (let y = 0; y < Math.min(h, newH); y++) {
          for (let x = 0; x < Math.min(w, newW); x++) {
            grid[y][x] = oldGrid[y][x];
          }
        }

        w = newW;
        h = newH;
        canvas.width = w * cellSize + padding;
        canvas.height = h * cellSize + padding;
        draw();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "12px sans-serif";
        ctx.fillStyle = "#666";

        // 列番号
        for (let i = 0; i < w; i++) {
          ctx.textAlign = "center";
          ctx.fillText(i + 1, padding + i * cellSize + cellSize / 2, 20);
        }
        // 行番号
        for (let i = 0; i < h; i++) {
          ctx.textAlign = "right";
          ctx.fillText(
            i + 1,
            padding - 5,
            padding + i * cellSize + cellSize / 2 + 4,
          );
        }

        // ドット描画
        ctx.strokeStyle = "#eee";
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            ctx.strokeRect(
              padding + x * cellSize,
              padding + y * cellSize,
              cellSize,
              cellSize,
            );
            if (grid[y][x]) {
              ctx.fillStyle = "#000";
              ctx.fillRect(
                padding + x * cellSize + 1,
                padding + y * cellSize + 1,
                cellSize - 2,
                cellSize - 2,
              );
            }
          }
        }
        generateCode();
      }

      canvas.onmousedown = (e) => {
        isDrawing = true;
        const x = Math.floor((e.offsetX - padding) / cellSize);
        const y = Math.floor((e.offsetY - padding) / cellSize);
        if (x >= 0 && x < w && y >= 0 && y < h) {
          drawMode = grid[y][x] ? 0 : 1;
          grid[y][x] = drawMode;
          draw();
        }
      };

      canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        const x = Math.floor((e.offsetX - padding) / cellSize);
        const y = Math.floor((e.offsetY - padding) / cellSize);
        if (x >= 0 && x < w && y >= 0 && y < h) {
          grid[y][x] = drawMode;
          draw();
        }
      };

      window.onmouseup = () => (isDrawing = false);

      function generateCode() {
        let code = `size: (${w}, ${h})\n(\n`;
        for (let y = 0; y < h; y++) {
          let val = parseInt(grid[y].join(""), 2);
          code += `  0x${val.toString(16).padStart(Math.ceil(w / 4), "0")},\n`;
        }
        code += ")";
        output.value = code;
      }

      // 初回描画
      init();
    </script>
  </body>
</html>
